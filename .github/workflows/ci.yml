name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    # allow manual runs on branches without a PR

env:
  FORCE_COLOR: "1"
  # conda-forge on anaconda.org intermittently returns HTTP 429 for repodata.json
  # from shared CI IPs. Retry with backoff so a throttle doesn't fail the job.
  CONDA_REMOTE_MAX_RETRIES: "8"
  CONDA_REMOTE_BACKOFF_FACTOR: "4"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version:
          - "3.10"
          - "3.12"
          - "3.14"
        include:
          - os: ubuntu-22.04
            python-version: "3.11"
          - os: ubuntu-22.04
            python-version: "3.13"
          - os: macos-15-intel
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up non-default Pythons
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v4
        if: matrix.python-version == '3.14'
        with:
          # Miniforge ships a recent conda-forge-native conda + mamba, so the
          # base doesn't have to self-update from the runner's old preinstalled
          # Miniconda (a multi-minute solve on Windows). conda >= 26.3 also drops
          # the built-in signature-verification plugin that conflicted with
          # conda-content-trust (see #1103), so no explicit conda-version pin.
          miniforge-version: latest
          channels: conda-forge
          conda-remove-defaults: true
          activate-environment:
      - name: Install Nox-under-test (uv)
        run:  uv pip install --system .
      - name: Run tests on ${{ matrix.os }}
        run: nox --session "tests-${{ matrix.python-version }}" -- --durations=10
      - name: Run min-version tests on ${{ matrix.os }}
        run: nox --session minimums --force-python="${{ matrix.python-version }}" -- --durations=10
      - name: Run Conda tests
        if: matrix.python-version == '3.14'
        run: nox --session "conda_tests" -- --durations=5
      - name: Save coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.job }}-${{ strategy.job-index }}
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error

  coverage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install Nox-under-test
        run:  uv pip install --system .
      - name: Download individual coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
      - name: Display structure of downloaded files
        run: ls -aR
      - name: Run coverage
        run: nox --session "cover"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Nox-under-test
        run: python -m pip install --disable-pip-version-check .
      - name: Lint
        run: nox --session "lint"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install Nox-under-test
        run:  uv pip install --system .
      - name: Docs
        run: nox --session "docs"
